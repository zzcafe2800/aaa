<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>【解決策①】保存時強調付き・自作画像ストレージテスト</title>
    <style>
        /* 🌟新しく追加された画像がピョコンと動く可愛いアニメーション設定 */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .new-saved-thumb {
            animation: popIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body style="background: #eef5fc; padding: 30px; font-family: sans-serif; text-align: center;">

    <h2>🐾 本サイト（親画面：すべての画像処理・保存を担当）</h2>
    <p>下のボタンを押して、保存時強調機能付きの小窓を起動してください。</p>

    <button id="openPipBtn" style="padding: 15px 30px; font-size: 18px; font-weight: bold; background: #007aff; color: white; border: none; border-radius: 8px; cursor: pointer;">
        ドロップくん（小窓）を起動する🐾
    </button>

    <canvas id="hiddenCanvas" width="200" height="200" style="display: none;"></canvas>

    <!-- 💡ここから下すべて小窓の中に引っ越しする中身 -->
    <div id="pipContent" style="padding: 15px; font-family: sans-serif; text-align: center; background: #fff; height: 100%; box-sizing: border-box;">
        
        <p style="font-size: 14px; color: #333; font-weight: bold; margin-top: 0;">【画像プレビュー】</p>
        
        <div style="width: 200px; height: 200px; border: 3px dashed #007aff; margin: 0 auto; background: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center;">
            <img id="previewImg" src="" draggable="true" style="width: 100%; height: 100%; object-fit: cover; cursor: grab;" alt="プレビュー">
        </div>
        
        <!-- 🌟ここが手動の決定（SAVE）ボタンになります -->
        <button id="commitBtn" style="margin-top: 10px; padding: 8px 25px; font-size: 14px; font-weight: bold; background: #67c23a; color: white; border: none; border-radius: 4px; cursor: pointer; box-shadow: 0 4px #4ea72a;">
            この画像をSAVEして履歴に追加（ポチッ）🐾
        </button>

        <p id="pipStatus" style="font-size: 12px; color: #ff9500; margin: 15px 0; font-weight: bold;">まずは下のスライダーを動かしてね！</p>
        <input type="range" id="moveSlider" min="0" max="255" value="150" style="width: 80%; margin-bottom: 20px;">

        <hr style="border: none; border-top: 1px solid #eee; margin: 15px 0;">

        <!-- 📁 自作画像ストレージ（お気に入り・ダウンロード履歴倉庫） -->
        <p style="font-size: 13px; color: #555; font-weight: bold; text-align: left; margin: 0 0 5px 5px;">🐾 ダウンロード履歴・お気に入り倉庫</p>
        
        <div id="storageDropZone" style="border: 2px dashed #999; background: #f9f9f9; padding: 12px; font-size: 11px; color: #666; border-radius: 5px; margin-bottom: 10px;">
            ここにパソコンのフォルダから直接画像をドロップしてストックも可能
        </div>
        
        <!-- 🌟ここに保存した画像がたまっていきます -->
        <div id="storageList" style="display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; padding: 10px 5px; background: #eee; height: 60px; border-radius: 5px; align-items: center;">
            <!-- 画像アイコン（サムネイル） -->
        </div>

    </div>

    <script>
        const openPipBtn = document.getElementById('openPipBtn');
        const pipContent = document.getElementById('pipContent');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const ctx = hiddenCanvas.getContext('2d');

        function processImageInParent(sliderValue) {
            ctx.fillStyle = `rgb(0, ${sliderValue}, 255)`; 
            ctx.fillRect(0, 0, 200, 200);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(40, 40, 120, 120);
            ctx.fillStyle = "#007aff";
            ctx.font = "bold 20px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("SAVE!!", 100, 110);
            return hiddenCanvas.toDataURL('image/png');
        }

        openPipBtn.addEventListener('click', async () => {
            if (!('documentPictureInPicture' in window)) {
                alert('対応していません。最新のChromeかEdgeで、かつlocalhost環境で実行してください。');
                return;
            }

            const pipWindow = await window.documentPictureInPicture.requestWindow({ width: 380, height: 560 });
            pipWindow.document.body.append(pipContent);

            const previewImg = pipWindow.document.getElementById('previewImg');
            const commitBtn = pipWindow.document.getElementById('commitBtn');
            const moveSlider = pipWindow.document.getElementById('moveSlider');
            const pipStatus = pipWindow.document.getElementById('pipStatus');
            const storageDropZone = pipWindow.document.getElementById('storageDropZone');
            const storageList = pipWindow.document.getElementById('storageList');

            let currentDataUrl = "";

            function updatePreview() {
                previewImg.style.backgroundColor = `rgb(0, ${moveSlider.value}, 255)`;
                pipStatus.innerText = "⚠️ まだ未保存です。緑のボタンを押してね。";
                pipStatus.style.color = "#ff9500";
            }
            updatePreview();
            moveSlider.addEventListener('input', updatePreview);

            // 🌟緑の「SAVE」ボタンを押した瞬間の処理
            commitBtn.addEventListener('click', () => {
                currentDataUrl = processImageInParent(moveSlider.value);
                previewImg.src = currentDataUrl;
                
                // 1. すべての過去のサムネイルから「強調の青枠」を一旦消す
                const allThumbs = storageList.getElementsByTagName('img');
                for(let t of allThumbs) {
                    t.style.border = '2px solid transparent';
                    t.style.boxShadow = 'none';
                }

                // 2. 新しいサムネイルを履歴リストの「先頭（左端）」に自動追加する
                const thumb = pipWindow.document.createElement('img');
                thumb.src = currentDataUrl;
                thumb.style.height = '45px'; 
                thumb.style.borderRadius = '4px'; 
                thumb.style.cursor = 'pointer';
                
                // 🌟【ここが強調演出！】ネオン水色の太い枠線と光るエフェクト（影）をつける
                thumb.style.border = '2px solid #00daff';
                thumb.style.boxShadow = '0 0 10px #00daff';
                
                // 上で定義した、ピョコンと拡大するアニメーション用のクラスをつける
                thumb.className = 'new-saved-thumb';

                // サムネイルをクリックしたらその画像をプレビューに一瞬で戻す設定
                thumb.addEventListener('click', () => {
                    for(let t of storageList.getElementsByTagName('img')) {
                        t.style.border = '2px solid transparent';
                        t.style.boxShadow = 'none';
                    }
                    thumb.style.border = '2px solid #007aff'; // 選択時は普通の青枠に
                    previewImg.src = thumb.src;
                    currentDataUrl = thumb.src;
                    pipStatus.innerText = "過去の画像を呼び出したにゃ！そのままドラッグ可能🐾";
                    pipStatus.style.color = "green";
                });

                // リストの一番最初（左端）に挿入する
                storageList.insertBefore(thumb, storageList.firstChild);

                // 横スクロールを自動で一番左（最新画像の位置）にスクロールさせる
                storageList.scrollLeft = 0;

                pipStatus.innerText = "⭕ SAVE完了！下に「ネオン枠」で追加されたにゃ！そのままゲームへ🐾";
                pipStatus.style.color = "green";
            });

            // ドラッグ開始処理（一覧と同じ本物のファイル構造をセットする部分）
            previewImg.addEventListener('dragstart', (e) => {
                if (!currentDataUrl) { e.preventDefault(); return; }
                const timeStamp = new Date().getTime();
                // 100%ゲームに入るスタンプを押す
                e.dataTransfer.setData("DownloadURL", `image/png:item_${timeStamp}.png:${currentDataUrl}`);
            });

            // 外部フォルダからのドロップ受付（バックアップ用）
            storageDropZone.addEventListener('dragover', (e) => e.preventDefault());
            storageDropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                const files = e.dataTransfer.files;
                for (let file of files) {
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const thumb = pipWindow.document.createElement('img');
                            thumb.src = event.target.result;
                            thumb.style.height = '45px'; thumb.style.borderRadius = '4px'; thumb.style.cursor = 'pointer';
                            thumb.style.border = '2px solid transparent';
                            thumb.addEventListener('click', () => {
                                previewImg.src = thumb.src;
                                currentDataUrl = thumb.src;
                                pipStatus.innerText = "ストックから呼び出したにゃ！";
                            });
                            storageList.insertBefore(thumb, storageList.firstChild);
                        };
                        reader.readAsDataURL(file);
                    }
                }
            });

            pipWindow.addEventListener('unload', () => { document.body.append(pipContent); });
        });
    </script>
</body>
</html>

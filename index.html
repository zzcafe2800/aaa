<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>メインブラウザ極小化＆PiPデモ</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #fff; color: #333; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        
        /* --- PiPウィンドウ内の専用スタイル --- */
        .pip-body { font-family: sans-serif; padding: 10px; background: #fff; margin: 0; text-align: center; overflow: hidden; }
        
        /* ダウンロード履歴の真下を狙い撃ちする上向き吹き出し */
        .arrow-up-balloon {
            position: relative; background: #ffeaa7; border: 2px solid #fdcb6e;
            padding: 8px; border-radius: 6px; font-size: 11px; font-weight: bold; color: #d63031; margin-top: 5px;
        }
        .arrow-up-balloon::before {
            content: ''; position: absolute; top: -10px; left: 85%;
            border-width: 0 10px 10px 10px; border-style: solid; border-color: transparent transparent #fdcb6e transparent;
        }
        
        .preview-box { margin-top: 10px; border: 1px dashed #ccc; padding: 5px; border-radius: 4px; }
        .preview-box img { width: 100%; max-height: 70px; object-fit: contain; }
        
        .action-btn { background: #007bff; color: white; border: none; width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; }
        .reset-btn { background: #ea2027; color: white; border: none; width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>

    <div id="mainContent">
        <h1>メインブラウザ極小化デモ</h1>
        <p>「PiPウィンドウを開く」を押すと、このメインブラウザが画面の左上に自動で小さく縮み、PiPが起動します。</p>
        <button id="openPip">PiPウィンドウを開く</button>
    </div>

<script>
// 文字入りPNG画像をCanvasで自動生成
function createTextImage() {
    const canvas = document.createElement('canvas');
    canvas.width = 300; canvas.height = 150;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#e0f7fa'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#006064'; ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('★ダウンロード対象★', canvas.width / 2, canvas.height / 2);
    return canvas.toDataURL('image/png');
}
const generatedPng = createTextImage();

// 元のブラウザサイズと位置を記憶しておく変数
let originalWidth = window.innerWidth;
let originalHeight = window.innerHeight;
let originalX = window.screenX;
let originalY = window.screenY;

document.getElementById('openPip').addEventListener('click', async () => {
    // 1. 現在のブラウザのサイズと位置を保存
    originalWidth = window.outerWidth;
    originalHeight = window.outerHeight;
    originalX = window.screenX;
    originalY = window.screenY;

    // 2. PiPウィンドウをコンパクトに起動
    const pipWin = await window.documentPictureInPicture.requestWindow({ width: 280, height: 260 });

    // 3. 【今回の本命】メインブラウザを左上の隅に移動させ、限界（極小）まで縮める
    window.moveTo(0, 0);
    window.resizeTo(100, 100); 

    // 4. スタイルをPiPに適用
    const style = document.createElement('style');
    style.textContent = document.querySelector('style').textContent;
    pipWin.document.head.appendChild(style);
    pipWin.document.body.className = 'pip-body';

    // 5. PiP内の初期画面
    function renderInitialView() {
        pipWin.document.body.innerHTML = `
            <div class="preview-box"><img src="${generatedPng}"></div>
            <button id="dlBtn" class="action-btn">📥 ダウンロードして履歴を表示</button>
            <button id="restoreBtn" class="reset-btn">🔳 メイン画面を元のサイズに戻す</button>
        `;

        // ダウンロード処理
        pipWin.document.getElementById('dlBtn').addEventListener('click', () => {
            const a = document.createElement('a');
            a.href = generatedPng;
            a.download = 'text-image.png';
            document.body.appendChild(a); // 元サイト（親）の裏側で実行
            a.click();
            a.remove();

            renderGuideView();
        });

        // サイトを元の大きさに戻す処理
        pipWin.document.getElementById('restoreBtn').addEventListener('click', restoreMainWindow);
    }

    // 6. ダウンロード後の案内画面
    function renderGuideView() {
        pipWin.document.body.innerHTML = `
            <div class="arrow-up-balloon">
                👆 画面右上の履歴に保存されました！<br>
                そこからドラッグ可能です！
            </div>
            <button id="restoreBtn2" class="reset-btn">🔳 メイン画面を元のサイズに戻す</button>
        `;

        pipWin.document.getElementById('restoreBtn2').addEventListener('click', restoreMainWindow);
    }

    // メイン画面の大きさと位置を復元する共通関数
    function restoreMainWindow() {
        window.resizeTo(originalWidth, originalHeight);
        window.moveTo(originalX, originalY);
    }

    // PiPが手動で閉じられた時も、自動でメイン画面を復元する
    pipWin.addEventListener('pagehide', restoreMainWindow);

    renderInitialView();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PiP内ダウンロード＆履歴強調デモ</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        
        /* --- PiPウィンドウ内の専用スタイル --- */
        .pip-body { font-family: sans-serif; padding: 12px; background: #f8f9fa; margin: 0; color: #333; }
        .title { font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #555; }
        .preview-img { width: 100%; max-height: 140px; object-fit: cover; border-radius: 6px; border: 1px solid #ccc; }
        .action-btn { background: #007bff; color: white; border: none; width: 100%; padding: 10px; margin-top: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        
        /* 履歴の上に表示される「吹き出し」 */
        .balloon {
            position: relative; background: #fff3cd; border: 1px solid #ffeeba;
            padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; color: #856404; margin-bottom: 12px;
        }
        .balloon::after {
            content: ''; position: absolute; bottom: -8px; left: 30px;
            border-width: 8px 8px 0; border-style: solid; border-color: #fff3cd transparent;
        }
        
        /* 最新ダウンロード（一番上）の最強調枠 */
        .latest-download {
            background: #fff; border: 3px solid #dc3545; padding: 10px;
            border-radius: 8px; box-shadow: 0 4px 10px rgba(220,53,69,0.2); margin-bottom: 15px;
        }
        .latest-download img { width: 100%; max-height: 120px; object-fit: cover; border-radius: 4px; display: block; margin-top: 5px; }
        
        /* 過去のダウンロード履歴リスト */
        .history-list { border-top: 1px dashed #ccc; padding-top: 10px; }
        .history-item { display: flex; align-items: center; gap: 10px; background: #fff; padding: 6px; border-radius: 4px; margin-bottom: 6px; border: 1px solid #eee; font-size: 11px; }
        .history-item img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>PiP内ダウンロード＆履歴デモ</h1>
    <button id="openPip">PiPウィンドウを開く</button>

<script>
// 文字が描かれた画像のダミーデータ（1番目が最初に表示される画像、2番目以降が過去の履歴用）
const images = [
    { url: 'https://unsplash.com', label: 'ダウンロード対象の画像（デザインA）' },
    { url: 'https://unsplash.com', label: '1分前に保存した画像' },
    { url: 'https://unsplash.com', label: '5分前に保存した画像' }
];

document.getElementById('openPip').addEventListener('click', async () => {
    // 1. PiPウィンドウを起動
    const pipWin = await window.documentPictureInPicture.requestWindow({ width: 340, height: 450 });

    // 2. メイン画面のスタイルをPiPに適用
    const style = document.createElement('style');
    style.textContent = document.querySelector('style').textContent;
    pipWin.document.head.appendChild(style);
    pipWin.document.body.className = 'pip-body';

    // 3. 最初に見せる「文字の描いた画像とDLボタン」を表示する関数
    function renderInitialView() {
        pipWin.document.body.innerHTML = `
            <div class="title">📄 文字が描かれた画像</div>
            <img src="${images[0].url}" class="preview-img" alt="Target">
            <button id="dlBtn" class="action-btn">📥 この画像をダウンロード</button>
        `;

        // DLボタンが押されたときの処理
        pipWin.document.getElementById('dlBtn').addEventListener('click', () => {
            // 実際にブラウザで画像ダウンロードを実行
            const a = document.createElement('a');
            a.href = images[0].url;
            a.download = 'text-image.jpg';
            pipWin.document.body.appendChild(a);
            a.click();
            a.remove();

            // ダウンロード完了後、履歴画面に書き換える
            renderHistoryView();
        });
    }

    // 4. ダウンロード後に「履歴の上に吹き出しをつけて最強調」する関数
    function renderHistoryView() {
        pipWin.document.body.innerHTML = `
            <!-- 履歴の上に表示される案内吹き出し -->
            <div class="balloon">✨ ダウンロードが完了しました！ここからドラッグも可能です！</div>
            
            <!-- 一番上の最新ダウンロード（赤枠で強調） -->
            <div class="latest-download">
                <span style="color: #dc3545; font-size: 11px; font-weight: bold;">🔴 最新のダウンロード履歴（最上部）</span>
                <img src="${images[0].url}" alt="Latest">
                <div style="font-size: 12px; margin-top: 5px; color: #555;">${images[0].label}</div>
            </div>
            
            <!-- それより古い過去の履歴一覧 -->
            <div class="title" style="font-size: 12px; color: #777;">📁 過去の履歴</div>
            <div class="history-list">
                <div class="history-item">
                    <img src="${images[1].url}">
                    <span>${images[1].label}</span>
                </div>
                <div class="history-item">
                    <img src="${images[2].url}">
                    <span>${images[2].label}</span>
                </div>
            </div>
        `;
    }

    // 初回起動時は最初の画面を表示
    renderInitialView();
});
</script>
</body>
</html>

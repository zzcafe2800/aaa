<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PiP画像ダウンロード</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        /* PiP内のスタイル定義 */
        .pip-body { font-family: sans-serif; padding: 10px; background: #f0f2f5; margin: 0; }
        .info-text { font-size: 14px; color: #555; margin-bottom: 8px; }
        /* 吹き出しのスタイル */
        .balloon {
            position: relative; background: #ffeaa7; padding: 8px;
            border-radius: 8px; font-size: 12px; margin-bottom: 12px; border: 1px solid #fdcb6e;
        }
        .balloon::after {
            content: ''; position: absolute; bottom: -8px; left: 20px;
            border-width: 8px 8px 0; border-style: solid; border-color: #ffeaa7 transparent;
        }
        /* 一番上のダウンロード画像を最強調 */
        .highlight-box {
            background: #fff; border: 3px solid #ff7675; padding: 10px;
            border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .highlight-box img { max-width: 100%; height: auto; border-radius: 4px; display: block; margin: 5px auto; }
        .dl-btn { background: #00cec9; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Document Picture-in-Picture デモ</h1>
    <button id="startPip">PiPウィンドウを開く</button>

<script>
const startPipBtn = document.getElementById('startPip');

// ダミーのダウンロード画像URL（サンプルの猫画像）とファイル名
const sampleImageUrl = 'https://unsplash.com';
const sampleText = 'サンプルテキスト：ファイルが正常に処理されました。';

startPipBtn.addEventListener('click', async () => {
    // 1. Document PiP ウィンドウを開く
    const pipWindow = await window.documentPictureInPicture.requestWindow({
        width: 320,
        height: 400,
    });

    // 2. メイン画面のスタイルをPiP内にコピー
    const style = document.createElement('style');
    style.textContent = document.querySelector('style').textContent;
    pipWindow.document.head.appendChild(style);

    // 3. PiP内のコンテンツ構造を作成（一番上の画像を赤枠で最強調、吹き出し付き）
    pipWindow.document.body.className = 'pip-body';
    pipWindow.document.body.innerHTML = `
        <!-- 適当な文字の表示エリア -->
        <div class="info-text">${sampleText}</div>
        
        <!-- ドラッグなどを案内する吹き出し -->
        <div class="balloon">💡 画像をドラッグしてデスクトップに保存するか、下のボタンでダウンロードできます！</div>
        
        <!-- ダウンロード一覧・最上部の強調画像エリア -->
        <div class="highlight-box">
            <strong style="color: #d63031; font-size: 12px;">🔥 新着ダウンロード画像</strong>
            <img src="${sampleImageUrl}" alt="Downloaded Image">
            <button id="pipDlBtn" class="dl-btn">画像を保存</button>
        </div>
    `;

    // 4. PiP内の「画像を保存」ボタンのダウンロード処理
    pipWindow.document.getElementById('pipDlBtn').addEventListener('click', () => {
        const a = document.createElement('a');
        a.href = sampleImageUrl;
        a.download = 'downloaded-image.jpg';
        pipWindow.document.body.appendChild(a);
        a.click();
        a.remove();
    });
});
</script>
</body>
</html>

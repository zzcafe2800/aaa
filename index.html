<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ブラウザダウンロード案内</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        
        /* --- PiPウィンドウ内の専用スタイル --- */
        .pip-body { font-family: sans-serif; padding: 10px; background: #fff; margin: 0; text-align: center; overflow: hidden; }
        
        /* 
          【ここがポイント】
          ブラウザのダウンロード履歴は「右上」に出るので、
          PiPの最上部に「上を指す矢印付きの吹き出し」を配置して誘導する
        */
        .arrow-up-balloon {
            position: relative;
            background: #ffeaa7;
            border: 2px solid #fdcb6e;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            color: #d63031;
            margin-top: 10px; /* 上部に少し隙間をあける */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        /* 上向きの三角形（矢印） */
        .arrow-up-balloon::before {
            content: '';
            position: absolute;
            top: -10px; /* 吹き出しの上に飛び出させる */
            left: 85%;  /* 右上のダウンロードボタンに近い位置に調整 */
            border-width: 0 10px 10px 10px;
            border-style: solid;
            border-color: transparent transparent #fdcb6e transparent;
        }
        .arrow-up-balloon::after {
            content: '';
            position: absolute;
            top: -7px;
            left: 85%;
            border-width: 0 10px 10px 10px;
            border-style: solid;
            border-color: transparent transparent #ffeaa7 transparent;
        }

        .preview-box { margin-top: 15px; border: 1px dashed #ccc; padding: 5px; border-radius: 4px; }
        .preview-box img { width: 100%; max-height: 80px; object-fit: contain; }
        .action-btn { background: #007bff; color: white; border: none; width: 100%; padding: 8px; margin-top: 8px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <h1>ブラウザのダウンロード履歴を案内するデモ</h1>
    <button id="openPip">PiPウィンドウを開く</button>

<script>
// 文字入りPNG画像
function createTextImage() {
    const canvas = document.createElement('canvas');
    canvas.width = 300; canvas.height = 150;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#e0f7fa'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#006064'; ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('★ダウンロード対象★', canvas.width / 2, canvas.height / 2);
    return canvas.toDataURL('image/png');
}
const generatedPng = createTextImage();

document.getElementById('openPip').addEventListener('click', async () => {
    // 1. PiPウィンドウを少し横長・コンパクトに開く
    const pipWin = await window.documentPictureInPicture.requestWindow({ 
        width: 280, 
        height: 260 
    });

    // 2. スタイル適用
    const style = document.createElement('style');
    style.textContent = document.querySelector('style').textContent;
    pipWin.document.head.appendChild(style);
    pipWin.document.body.className = 'pip-body';

    // 3. 初期表示
    function renderInitialView() {
        pipWin.document.body.innerHTML = `
            <div class="preview-box">
                <img src="${generatedPng}">
            </div>
            <button id="dlBtn" class="action-btn">📥 ダウンロードして履歴を表示</button>
        `;

        pipWin.document.getElementById('dlBtn').addEventListener('click', () => {
            // ダウンロード実行
            const a = document.createElement('a');
            a.href = generatedPng;
            a.download = 'text-image.png';
            document.body.appendChild(a); 
            a.click();
            a.remove();

            // 保存完了後、ブラウザの右上履歴を指し示す画面に変形
            renderGuideView();
        });
    }

    // 4. ダウンロードした瞬間、PiPの最上部に「上向きの吹き出し矢印」を出す
    function renderGuideView() {
        pipWin.document.body.innerHTML = `
            <!-- ブラウザの右上履歴を狙い撃ちする上向きの吹き出し -->
            <div class="arrow-up-balloon">
                👆 画面右上の「ダウンロード履歴」に保存されました！<br>
                そこからデスクトップへドラッグ＆ドロップできます！
            </div>

            <div class="preview-box" style="opacity: 0.5; margin-top: 10px;">
                <img src="${generatedPng}">
            </div>
        `;
    }

    renderInitialView();
});
</script>
</body>
</html>

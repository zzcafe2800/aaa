<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>手動決定式・デスクトップ自動ファイル化テスト</title>
</head>
<body style="background: #fdf6ec; padding: 30px; font-family: sans-serif; text-align: center;">

    <h2>🐾 本サイト（親画面：バックグラウンド処理）</h2>
    <p>ボタンを押してドロップくん（小窓）を起動してください。</p>

    <button id="openPipBtn" style="padding: 15px 30px; font-size: 18px; font-weight: bold; background: #e6a23c; color: white; border: none; border-radius: 8px; cursor: pointer;">
        ドロップくん（小窓）を起動する🐾
    </button>

    <!-- 親画面側にある非表示の画像処理用キャンバス -->
    <canvas id="hiddenCanvas" width="200" height="200" style="display: none;"></canvas>

    <!-- 小窓の中に引っ越しさせる中身（HTML） -->
    <div id="pipContent" style="padding: 15px; font-family: sans-serif; text-align: center; background: #fff; height: 100%;">
        <p style="font-size: 14px; color: #555; font-weight: bold;">【手動で決定してデスクトップへ】</p>
        
        <!-- 正方形のプレビュー画像欄 -->
        <div style="width: 200px; height: 200px; border: 3px dashed #e6a23c; margin: 0 auto; background: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center;">
            <img id="previewImg" src="" draggable="true" style="width: 100%; height: 100%; object-fit: cover; cursor: grab;" alt="プレビュー">
        </div>

        <!-- 動作シミュレーション用のスライダー -->
        <div style="margin-top: 15px;">
            <label style="font-size: 12px; color: #666;">枠を動かす（この時点ではまだ未確定）:</label><br>
            <input type="range" id="moveSlider" min="0" max="255" value="180" style="width: 80%;">
        </div>

        <!-- 🌟手動でポチッとする処理ボタン -->
        <div style="margin-top: 15px;">
            <button id="commitBtn" style="padding: 8px 20px; font-size: 14px; font-weight: bold; background: #67c23a; color: white; border: none; border-radius: 4px; cursor: pointer;">
                この枠で画像を確定する（ポチッ）🐾
            </button>
        </div>

        <p id="pipStatus" style="font-size: 13px; color: #e6a23c; margin-top: 15px; font-weight: bold;">枠を決めたら、緑のボタンを押してね！</p>
    </div>

    <script>
        const openPipBtn = document.getElementById('openPipBtn');
        const pipContent = document.getElementById('pipContent');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const ctx = hiddenCanvas.getContext('2d');

        // ボタンをポチッとしたときだけ親画面でCanvas画像（DataURL）を作る関数
        function processImageInParent(sliderValue) {
            ctx.fillStyle = `rgb(230, ${sliderValue}, 60)`; 
            ctx.fillRect(0, 0, 200, 200);
            
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(40, 40, 120, 120);
            
            ctx.fillStyle = "#e6a23c";
            ctx.font = "bold 16px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("MANUAL", 100, 95);
            ctx.fillText("READY! 🐾", 100, 125);

            return hiddenCanvas.toDataURL('image/png');
        }

        openPipBtn.addEventListener('click', async () => {
            if (!('documentPictureInPicture' in window)) {
                alert('お使いのブラウザは対応していません。ChromeかEdgeを使用してください。');
                return;
            }

            const pipWindow = await window.documentPictureInPicture.requestWindow({ width: 350, height: 480 });
            pipWindow.document.body.append(pipContent);

            const previewImg = pipWindow.document.getElementById('previewImg');
            const moveSlider = pipWindow.document.getElementById('moveSlider');
            const commitBtn = pipWindow.document.getElementById('commitBtn');
            const pipStatus = pipWindow.document.getElementById('pipStatus');

            let currentDataUrl = "";
            let isConfirmed = false;

            // スライダーを動かしている間は、簡易的な仮の見た目だけ変更（裏の本格処理はしない）
            moveSlider.addEventListener('input', () => {
                previewImg.style.backgroundColor = `rgb(230, ${moveSlider.value}, 60)`;
                pipStatus.innerText = "⚠️ まだ未確定です。緑のボタンを押してください。";
                pipStatus.style.color = "#e6a23c";
                isConfirmed = false;
            });

            // 🌟緑のボタンを「手動でポチッ」としたときの処理
            commitBtn.addEventListener('click', () => {
                currentDataUrl = processImageInParent(moveSlider.value);
                previewImg.src = currentDataUrl; // 確定した画像を表示
                pipStatus.innerText = "⭕ 画像が確定しました！デスクトップへドラッグしてね！";
                pipStatus.style.color = "green";
                isConfirmed = true;
            });

            // 🚀 【DownloadURLの設定】
            previewImg.addEventListener('dragstart', (e) => {
                if (!isConfirmed || !currentDataUrl) {
                    e.preventDefault(); // 確定ボタンを押していない時はドラッグを禁止する
                    alert("先に『この枠で画像を確定する』ボタンを押してにゃ！🐾");
                    return;
                }

                const fileName = "manual_item.png";
                // デスクトップにファイルを作成するスタンプをセット
                e.dataTransfer.setData("DownloadURL", `image/png:${fileName}:${currentDataUrl}`);
                pipStatus.innerText = "⚡ デスクトップにファイルを作成中...";
            });

            previewImg.addEventListener('dragend', () => {
                pipStatus.innerText = "生成完了！デスクトップからゲームへスライドしてね🐾";
            });
        });
    </script>
</body>
</html>

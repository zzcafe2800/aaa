<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ワンクリック・クリップボード自動コピーテスト</title>
</head>
<body style="background: #f0fdf4; padding: 30px; font-family: sans-serif; text-align: center;">

    <h2>🐾 本サイト（親画面：バックグラウンド処理）</h2>
    <p>ボタンを押してドロップくん（小窓）を起動してください。</p>

    <button id="openPipBtn" style="padding: 15px 30px; font-size: 18px; font-weight: bold; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer;">
        ドロップくん（小窓）を起動する🐾
    </button>

    <!-- 親画面側にある非表示の画像処理用キャンバス -->
    <canvas id="hiddenCanvas" width="200" height="200" style="display: none;"></canvas>

    <!-- 小窓の中に引っ越しさせる中身（HTML） -->
    <div id="pipContent" style="padding: 15px; font-family: sans-serif; text-align: center; background: #fff; height: 100%;">
        <p style="font-size: 14px; color: #555; font-weight: bold;">【クリックでコピー ➔ ゲームでCtrl+V】</p>
        
        <!-- クリックしてコピーするためのプレビュー枠（ドラッグは不要です） -->
        <div id="clickArea" style="width: 200px; height: 200px; border: 3px dashed #28a745; margin: 0 auto; background: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer;">
            <img id="previewImg" src="" style="width: 100%; height: 100%; object-fit: cover;" alt="プレビュー">
        </div>

        <!-- 動作シミュレーション用のスライダー -->
        <div style="margin-top: 15px;">
            <label style="font-size: 12px; color: #666;">枠を動かす（この時点ではまだ未確定）:</label><br>
            <input type="range" id="moveSlider" min="0" max="255" value="120" style="width: 80%;">
        </div>

        <!-- 手動でポチッとする処理ボタン -->
        <div style="margin-top: 15px;">
            <button id="commitBtn" style="padding: 8px 20px; font-size: 14px; font-weight: bold; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">
                この枠で画像を確定する（ポチッ）🐾
            </button>
        </div>

        <p id="pipStatus" style="font-size: 13px; color: #28a745; margin-top: 15px; font-weight: bold;">枠を決めたら、緑のボタンを押してね！</p>
    </div>

    <script>
        const openPipBtn = document.getElementById('openPipBtn');
        const pipContent = document.getElementById('pipContent');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const ctx = hiddenCanvas.getContext('2d');

        function processImageInParent(sliderValue) {
            // 緑ベースのグラフィックを生成
            ctx.fillStyle = `rgb(40, ${sliderValue}, 69)`; 
            ctx.fillRect(0, 0, 200, 200);
            
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(40, 40, 120, 120);
            
            ctx.fillStyle = "#28a745";
            ctx.font = "bold 16px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("CLICK", 100, 95);
            ctx.fillText("COPY! 🐾", 100, 125);

            return new Promise(resolve => hiddenCanvas.toBlob(resolve, 'image/png'));
        }

        openPipBtn.addEventListener('click', async () => {
            if (!('documentPictureInPicture' in window)) {
                alert('お使いのブラウザは対応していません。ChromeかEdgeを使用してください。');
                return;
            }

            const pipWindow = await window.documentPictureInPicture.requestWindow({ width: 350, height: 480 });
            pipWindow.document.body.append(pipContent);

            const previewImg = pipWindow.document.getElementById('previewImg');
            const clickArea = pipWindow.document.getElementById('clickArea');
            const commitBtn = pipWindow.document.getElementById('commitBtn');
            const pipStatus = pipWindow.document.getElementById('pipStatus');

            let currentBlob = null;
            let isConfirmed = false;

            moveSlider.addEventListener('input', () => {
                previewImg.style.backgroundColor = `rgb(40, ${moveSlider.value}, 69)`;
                pipStatus.innerText = "⚠️ まだ未確定です。緑のボタンを押してください。";
                pipStatus.style.color = "#e6a23c";
                isConfirmed = false;
            });

            // 🌟緑のボタンをポチッとしたときに画像を親画面で生成
            commitBtn.addEventListener('click', async () => {
                currentBlob = await processImageInParent(moveSlider.value);
                previewImg.src = URL.createObjectURL(currentBlob);
                pipStatus.innerText = "⭕ 確定！画像を1回左クリックしてね！";
                pipStatus.style.color = "green";
                isConfirmed = true;
            });

            // 🚀 【クリック時にクリップボードへ画像そのものをコピー】
            clickArea.addEventListener('click', async () => {
                if (!isConfirmed || !currentBlob) {
                    alert("先に『この枠で画像を確定する』ボタンを押してにゃ！🐾");
                    return;
                }

                try {
                    // 文字列ではなく、画像ファイルオブジェクト(Blob)をそのままクリップボードに格納
                    await pipWindow.navigator.clipboard.write([
                        new ClipboardItem({ [currentBlob.type]: currentBlob })
                    ]);
                    
                    pipStatus.innerText = "⭕ コピー成功！ゲームで Ctrl + V を押してにゃ🐾";
                    pipStatus.style.color = "#007aff";
                } catch (err) {
                    pipStatus.innerText = "❌ コピー失敗: " + err.message;
                    pipStatus.style.color = "red";
                }
            });
        });
    </script>
</body>
</html>

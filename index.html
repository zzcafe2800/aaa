<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>2つのフォルダ機能 比較テスト画面</title>
</head>
<body style="background: #eef5fc; padding: 30px; font-family: sans-serif; text-align: center;">

    <h2>🐾 本サイト（親画面：バックグラウンド処理）</h2>
    <p>下のボタンを押して、両方の機能を詰め込んだ小窓を起動してください。</p>

    <button id="openPipBtn" style="padding: 15px 30px; font-size: 18px; font-weight: bold; background: #007aff; color: white; border: none; border-radius: 8px; cursor: pointer;">
        フォルダ実験用小窓を起動する🐾
    </button>

    <!-- 親画面側にある非表示の画像処理用キャンバス -->
    <canvas id="hiddenCanvas" width="200" height="200" style="display: none;"></canvas>

    <!-- 💡ここから下すべて小窓の中に引っ越しする中身 -->
    <div id="pipContent" style="padding: 10px; font-family: sans-serif; text-align: center; background: #fff; height: 100%; box-sizing: border-box;">
        
        <!-- 【上段】プレビューエリア（共通） -->
        <div style="width: 180px; height: 180px; border: 3px dashed #007aff; margin: 0 auto; background: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center;">
            <img id="previewImg" src="" draggable="true" style="width: 100%; height: 100%; object-fit: cover; cursor: grab;" alt="プレビュー">
        </div>
        <button id="commitBtn" style="margin-top: 8px; padding: 5px 15px; font-size: 12px; background: #67c23a; color: white; border: none; border-radius: 4px; cursor: pointer;">画像を確定（ポチッ）🐾</button>

        <p id="pipStatus" style="font-size: 11px; color: #666; margin: 8px 0;">スライダーを動かして「確定」を押してね</p>
        <input type="range" id="moveSlider" min="0" max="255" value="150" style="width: 80%; margin-bottom: 15px;">

        <!-- 選択肢切り替え用のミニタブ -->
        <div style="display: flex; border-bottom: 2px solid #ccc; margin-bottom: 10px;">
            <button id="tab1Btn" style="flex: 1; padding: 6px; font-size: 11px; font-weight: bold; background: #007aff; color: white; border: none; cursor: pointer;">①自作ストレージ</button>
            <button id="tab2Btn" style="flex: 1; padding: 6px; font-size: 11px; font-weight: bold; background: #eee; color: #333; border: none; cursor: pointer;">②本物フォルダ同期</button>
        </div>

        <!-- 📁 【選択肢①：自作の画像ストレージエリア】 -->
        <div id="panel1" style="display: block;">
            <div id="storageDropZone" style="border: 2px dashed #999; background: #f9f9f9; padding: 10px; font-size: 11px; color: #666; border-radius: 5px; margin-bottom: 8px;">
                ここに画像ファイルをドロップしてストック（登録）
            </div>
            <div id="storageList" style="display: flex; gap: 5px; overflow-x: auto; white-space: nowrap; padding: 5px; background: #eee; height: 50px; border-radius: 5px; align-items: center;">
                <!-- ここに登録した画像がたまります -->
            </div>
        </div>

        <!-- 📂 【選択肢②：本物のフォルダ同期エリア】 -->
        <div id="panel2" style="display: none;">
            <button id="syncFolderBtn" style="padding: 6px 12px; font-size: 11px; background: #e6a23c; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
                PCの本物フォルダを選択して同期する🐾
            </button>
            <div id="folderFileList" style="text-align: left; max-height: 70px; overflow-y: auto; background: #f4f4f5; font-size: 11px; padding: 5px; border-radius: 5px; margin-top: 8px; border: 1px solid #ddd;">
                フォルダ未選択です
            </div>
        </div>

    </div>

    <script>
        const openPipBtn = document.getElementById('openPipBtn');
        const pipContent = document.getElementById('pipContent');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const ctx = hiddenCanvas.getContext('2d');

        // 親画面側でのダミー画像合成
        function processImageInParent(sliderValue, baseImgSrc = null) {
            ctx.fillStyle = `rgb(0, ${sliderValue}, 255)`; 
            ctx.fillRect(0, 0, 200, 200);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(40, 40, 120, 120);
            ctx.fillStyle = "#007aff";
            ctx.font = "bold 16px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("FOLDER", 100, 95);
            ctx.fillText("TEST! 🐾", 100, 125);
            return hiddenCanvas.toDataURL('image/png');
        }

        openPipBtn.addEventListener('click', async () => {
            if (!('documentPictureInPicture' in window) || !('showDirectoryPicker' in window)) {
                alert('お使いのブラウザは対応していません。最新のChromeかEdgeで、かつlocalhost環境で実行してください。');
                return;
            }

            // 小窓を使いやすいサイズで起動
            const pipWindow = await window.documentPictureInPicture.requestWindow({ width: 380, height: 540 });
            pipWindow.document.body.append(pipContent);

            // 小窓内の要素たちを取得
            const previewImg = pipWindow.document.getElementById('previewImg');
            const commitBtn = pipWindow.document.getElementById('commitBtn');
            const moveSlider = pipWindow.document.getElementById('moveSlider');
            const pipStatus = pipWindow.document.getElementById('pipStatus');
            const tab1Btn = pipWindow.document.getElementById('tab1Btn');
            const tab2Btn = pipWindow.document.getElementById('tab2Btn');
            const panel1 = pipWindow.document.getElementById('panel1');
            const panel2 = pipWindow.document.getElementById('panel2');
            const storageDropZone = pipWindow.document.getElementById('storageDropZone');
            const storageList = pipWindow.document.getElementById('storageList');
            const syncFolderBtn = pipWindow.document.getElementById('syncFolderBtn');
            const folderFileList = pipWindow.document.getElementById('folderFileList');

            let currentDataUrl = "";
            let isConfirmed = false;

            // --- 共通のプレビュー制御 ---
            function updatePreview() {
                previewImg.style.backgroundColor = `rgb(0, ${moveSlider.value}, 255)`;
                pipStatus.innerText = "⚠️ 未確定です。確定ボタンを押してください。";
                isConfirmed = false;
            }
            updatePreview();
            moveSlider.addEventListener('input', updatePreview);

            commitBtn.addEventListener('click', () => {
                currentDataUrl = processImageInParent(moveSlider.value);
                previewImg.src = currentDataUrl;
                pipStatus.innerText = "⭕ 確定！デスクトップへドラッグしてね！";
                isConfirmed = true;
            });

            previewImg.addEventListener('dragstart', (e) => {
                if (!isConfirmed) { e.preventDefault(); alert("先に確定させてにゃ！"); return; }
                const timeStamp = new Date().getTime();
                e.dataTransfer.setData("DownloadURL", `image/png:item_${timeStamp}.png:${currentDataUrl}`);
            });

            // --- タブ切り替えシステム ---
            tab1Btn.addEventListener('click', () => {
                panel1.style.display = 'block'; panel2.style.display = 'none';
                tab1Btn.style.background = '#007aff'; tab1Btn.style.color = '#fff';
                tab2Btn.style.background = '#eee'; tab2Btn.style.color = '#333';
            });
            tab2Btn.addEventListener('click', () => {
                panel1.style.display = 'none'; panel2.style.display = 'block';
                tab1Btn.style.background = '#eee'; tab1Btn.style.color = '#333';
                tab2Btn.style.background = '#007aff'; tab2Btn.style.color = '#fff';
            });

            // 📁 【機能①：自作画像ストレージの実装】
            storageDropZone.addEventListener('dragover', (e) => e.preventDefault());
            storageDropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                const files = e.dataTransfer.files;
                for (let file of files) {
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            // サムネイル用の小さな画像を作成して枠に追加
                            const thumb = pipWindow.document.createElement('img');
                            thumb.src = event.target.result;
                            thumb.style.height = '40px'; thumb.style.borderRadius = '3px'; thumb.style.cursor = 'pointer';
                            // クリックしたらその画像をプレビューに一瞬でセット
                            thumb.addEventListener('click', () => {
                                previewImg.src = thumb.src;
                                currentDataUrl = thumb.src;
                                isConfirmed = true;
                                pipStatus.innerText = "倉庫の画像をセットしたにゃ！このままドラッグ可能🐾";
                            });
                            storageList.appendChild(thumb);
                        };
                        reader.readAsDataURL(file);
                    }
                }
                storageDropZone.innerText = "登録完了！下にストックされました🐾";
            });

            // 📂 【機能②：本物のフォルダ同期の実装（File System Access API）】
            syncFolderBtn.addEventListener('click', async () => {
                try {
                    // 安全制限回避のため、親画面（window.opener）のコンテキストを借りてフォルダを開く
                    const dirHandle = await window.opener.showDirectoryPicker();
                    folderFileList.innerHTML = ""; // リストをクリア
                    
                    // フォルダの中のファイルをループして画像だけを探す
                    for await (const entry of dirHandle.values()) {
                        if (entry.kind === 'file' && (entry.name.endsWith('.png') || entry.name.endsWith('.jpg') || entry.name.endsWith('.jpeg'))) {
                            const itemDiv = pipWindow.document.createElement('div');
                            itemDiv.innerText = `📄 ${entry.name}`;
                            itemDiv.style.cursor = 'pointer';
                            itemDiv.style.padding = '2px';
                            itemDiv.style.borderBottom = '1px solid #eee';

                            // フォルダ内のファイル名をクリックしたときの処理
